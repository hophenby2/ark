name: Auto Update Config
permissions:
  contents: write

on:
  schedule:
    - cron: "30 22 * * *"    # UTC 22:00，北京时间 06:30
    - cron: "0 8 * * *"     # UTC 08:00，北京时间 16:00
    - cron: "30 11 * * *"   # UTC 11:30，北京时间 19:30
  workflow_dispatch:

jobs:
  auto-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch latest versions
        id: fetch
        run: |
          # 国服 Android
          curl -s "https://ak-conf.hypergryph.com/config/prod/official/Android/version" -o cn_android.json
          echo "cn_android_resVersion=$(jq -r '.resVersion' cn_android.json)" >> $GITHUB_ENV
          echo "cn_android_clientVersion=$(jq -r '.clientVersion' cn_android.json)" >> $GITHUB_ENV

          # 国服 Windows
          curl -s "https://ak-conf.hypergryph.com/config/prod/official/Windows/version" -o cn_windows.json
          echo "cn_windows_resVersion=$(jq -r '.resVersion' cn_windows.json)" >> $GITHUB_ENV
          echo "cn_windows_clientVersion=$(jq -r '.clientVersion' cn_windows.json)" >> $GITHUB_ENV

          # 国际服 Android
          curl -s "https://ark-us-static-online.yo-star.com/assetbundle/official/Android/version" -o global_android.json
          echo "global_android_resVersion=$(jq -r '.resVersion' global_android.json)" >> $GITHUB_ENV
          echo "global_android_clientVersion=$(jq -r '.clientVersion' global_android.json)" >> $GITHUB_ENV

          # 国服网络配置
          curl -s "https://ak-conf.hypergryph.com/config/prod/official/network_config" -o cn_network.json
          echo "cn_funcVer=$(jq -r '.content' cn_network.json | jq -r '.funcVer')" >> $GITHUB_ENV

          # 国际服网络配置
          curl -s "https://ak-conf.arknights.global/config/prod/official/network_config" -o global_network.json
          echo "global_funcVer=$(jq -r '.content' global_network.json | jq -r '.funcVer')" >> $GITHUB_ENV

      - name: Update config.json
        id: update
        run: |
          file="config/config.json"
          changed=false
          res_version_changed=false

          # ----- 国服 Android -----
          old=$(jq -r '.version.android.resVersion' $file)
          if [ "$old" != "$cn_android_resVersion" ]; then
            jq --arg v "$cn_android_resVersion" '.version.android.resVersion = $v' $file > tmp && mv tmp $file
            res_version_changed=true; changed=true
          fi
          old=$(jq -r '.version.android.clientVersion' $file)
          if [ "$old" != "$cn_android_clientVersion" ]; then
            jq --arg v "$cn_android_clientVersion" '.version.android.clientVersion = $v' $file > tmp && mv tmp $file
            changed=true
          fi

          # ----- 国服 Windows -----
          old=$(jq -r '.version.Windows.resVersion' $file)
          if [ "$old" != "$cn_windows_resVersion" ]; then
            jq --arg v "$cn_windows_resVersion" '.version.Windows.resVersion = $v' $file > tmp && mv tmp $file
            res_version_changed=true; changed=true
          fi
          old=$(jq -r '.version.Windows.clientVersion' $file)
          if [ "$old" != "$cn_windows_clientVersion" ]; then
            jq --arg v "$cn_windows_clientVersion" '.version.Windows.clientVersion = $v' $file > tmp && mv tmp $file
            changed=true
          fi

          # ----- 国际服 Android -----
          old=$(jq -r '.versionGlobal.android.resVersion' $file)
          if [ "$old" != "$global_android_resVersion" ]; then
            jq --arg v "$global_android_resVersion" '.versionGlobal.android.resVersion = $v' $file > tmp && mv tmp $file
            res_version_changed=true; changed=true
          fi
          old=$(jq -r '.versionGlobal.android.clientVersion' $file)
          if [ "$old" != "$global_android_clientVersion" ]; then
            jq --arg v "$global_android_clientVersion" '.versionGlobal.android.clientVersion = $v' $file > tmp && mv tmp $file
            changed=true
          fi

          # ----- 国服 funcVer 迁移 -----
          old_func=$(jq -r '.networkConfig.cn.content.funcVer' $file)
          if [ "$old_func" != "$cn_funcVer" ]; then
            jq --arg new "$cn_funcVer" --arg old "$old_func" '
              .networkConfig.cn.content.funcVer = $new |
              .networkConfig.cn.content.configs[$new] = .networkConfig.cn.content.configs[$old] |
              del(.networkConfig.cn.content.configs[$old])
            ' $file > tmp && mv tmp $file
            changed=true
          fi

          # ----- 国际服 funcVer 迁移 -----
          old_func=$(jq -r '.networkConfig.global.content.funcVer' $file)
          if [ "$old_func" != "$global_funcVer" ]; then
            jq --arg new "$global_funcVer" --arg old "$old_func" '
              .networkConfig.global.content.funcVer = $new |
              .networkConfig.global.content.configs[$new] = .networkConfig.global.content.configs[$old] |
              del(.networkConfig.global.content.configs[$old])
            ' $file > tmp && mv tmp $file
            changed=true
          fi

          # ----- 如果有任何 resVersion 更新，则设置 useUserData = false -----
          if [ "$res_version_changed" = true ]; then
            jq '.userConfig.useUserData = false' $file > tmp && mv tmp $file
            changed=true
          fi

          echo "changed=$changed" >> $GITHUB_ENV

      - name: Commit and push changes
        if: env.changed == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git checkout main
          git pull --rebase --autostash origin main

          git add config/config.json
          git commit -m "自动更新 config.json (resVer=${{ env.cn_android_resVersion }}, clientVer=${{ env.cn_android_clientVersion }}, funcVer=${{ env.cn_funcVer }})" || echo "No changes"
          git push origin main

      - name: No changes
        if: env.changed != 'true'
        run: echo "No updates detected."